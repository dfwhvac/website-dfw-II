name: KPI Audit

# Refreshes /internal/kpi-dashboard.html data weekly.
#
# WHAT THIS DOES:
#   - Runs scripts/audit-kpis.mjs with all known API secrets injected from
#     GitHub Actions Secrets (PAGESPEED_API_KEY, etc. as they get added)
#   - Commits the resulting frontend/public/internal/kpi-snapshot.json and
#     dated archive to memory/audits/kpi-snapshot-archive/ back to main
#   - Vercel auto-deploys → dashboard updates within ~90s of commit
#
# WHY:
#   - Replaces the manual `yarn audit:kpis` Monday step (RECURRING_MAINTENANCE row W4)
#   - Keeps API keys in encrypted GitHub Secrets — never in chat, never on disk
#   - Trend arrows (▲▼→) populate naturally from the weekly snapshot diff
#
# Added May 11, 2026.

on:
  schedule:
    # Monday 7 AM Central (13:00 UTC during DST, 13:00 UTC standard — close enough)
    # Same cadence as Security Audit so both run in one window.
    - cron: "0 13 * * 1"
  # Manual on-demand: Actions tab → KPI Audit → "Run workflow"
  # Use this after rotating any secret or to verify a freshly-added key works.
  workflow_dispatch:

permissions:
  contents: write   # required to commit snapshot back to main

jobs:
  audit:
    name: refresh KPI snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          # Use a fine-grained PAT (KPI_AUDIT_PAT) issued under a Repository
          # Admin's identity rather than GITHUB_TOKEN. GitHub's repository
          # rulesets cannot grant bypass permission to github-actions[bot]
          # (it's not exposed as a bypass actor), so the bot's push to main
          # gets rejected with GH013 even when permissions: contents: write
          # is granted in this workflow. A user-owned PAT belongs to a real
          # account that CAN be added to the bypass list (via Repository
          # admin role), which lets the commit go through.
          # See /app/memory/CHANGELOG.md (KPI Audit auth section) for context.
          token: ${{ secrets.KPI_AUDIT_PAT }}
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      # No `yarn install` needed — audit-kpis.mjs uses only Node built-ins
      # (fs, path, child_process) and pulls Pa11y on-demand via `npx --yes pa11y`.
      # Skipping the install step avoids being blocked on lockfile drift.

      - name: Run KPI audit
        # GITHUB_ACTIONS=true is auto-set by the runner. audit-kpis.mjs uses this
        # flag to (a) write the canonical snapshot path and (b) emit the dated
        # archive. Local dev runs route to kpi-snapshot.local.json (gitignored)
        # to prevent the recurring snapshot merge-conflict pattern.
        run: node scripts/audit-kpis.mjs
        env:
          # === API keys (added as GitHub Secrets one at a time) ===
          # Missing keys leave their respective KPIs gray — script never fails.
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          UPTIMEROBOT_API_KEY: ${{ secrets.UPTIMEROBOT_API_KEY }}
          UPTIMEROBOT_MONITOR_ID: ${{ secrets.UPTIMEROBOT_MONITOR_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          # === Google OAuth user-credentials flow (replaces service account) ===
          # Mint refresh token via developers.google.com/oauthplayground using
          # client_id + client_secret from console.cloud.google.com/auth/clients.
          # Scopes: analytics.readonly + webmasters.readonly.
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          # === Auto-provided by GitHub ===
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          AUDIT_DOMAIN: dfwhvac.com

      - name: Show snapshot summary
        run: |
          # Quick rollup to the run log so we can scan it without downloading
          python3 - <<'EOF'
          import json
          with open('frontend/public/internal/kpi-snapshot.json') as f:
              d = json.load(f)
          tally = {'green':0,'yellow':0,'red':0,'gray':0}
          for p in d['phases']:
              for k in p['kpis']:
                  tally[k['status']] += 1
          print(f"::notice::KPI snapshot · 🟢 {tally['green']} 🟡 {tally['yellow']} 🔴 {tally['red']} ⚪ {tally['gray']} (of {sum(tally.values())})")
          # Surface anything that flipped to red
          reds = [(p['label'], k['label'], k['value']) for p in d['phases'] for k in p['kpis'] if k['status'] == 'red']
          for phase, label, value in reds:
              print(f"::warning::RED · {phase} · {label} = {value}")
          EOF

      - name: Commit snapshot
        run: |
          # Commit author identity: use a generic "kpi-audit" label rather
          # than the PAT owner's real email. Keeps the audit log tidy and
          # avoids leaking the human's commit email into every weekly entry.
          # The push itself still authenticates as the PAT owner (a Repo
          # Admin in the ruleset bypass list).
          git config user.name "kpi-audit-bot"
          git config user.email "kpi-audit@dfwhvac.com"
          git add frontend/public/internal/kpi-snapshot.json memory/audits/kpi-snapshot-archive/
          if git diff --cached --quiet; then
            echo "::notice::No snapshot changes — skipping commit"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "chore(kpi): weekly snapshot ${DATE} [skip ci]"
          git push
