name: Security Audit

# Phase 1 P1.D items F8 (Dependabot+gitleaks) and F3d (yarn audit CI gate).
# Added Feb 28, 2026.
#
# WHAT THIS GATES:
#   - yarn audit on every PR + main push: fails the build on high/critical advisories
#   - gitleaks on every PR + main push: blocks secret leaks before they merge
#
# WHY:
#   - F3d closes the dependency-vuln blind spot. Sanity admin packages are
#     ignored as accepted risk (admin-only, see Apr 21 audit).
#   - F8 prevents the recurring "credential committed by accident" class of bug.
#     Site has 6+ third-party API keys (Sanity, Resend, Google Places, reCAPTCHA,
#     Google Auth, Vercel) — secret-leak detection is non-optional.

on:
  push:
    branches: [main, preview]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 7 AM Central — catches advisories disclosed against pinned versions
    # even when no PR has been opened.
    - cron: "0 13 * * 1"
  # Manual on-demand trigger — Actions tab → Security Audit → "Run workflow" button.
  # Useful for ad-hoc audits after rotating secrets or before a deploy.
  workflow_dispatch:

jobs:
  yarn-audit:
    name: yarn audit (critical only)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          # NOTE: yarn cache deliberately disabled here. It's a nice-to-have
          # (saves ~30s per run) that turned into a brittle dependency-path
          # configuration. Audit + install completes in ~60s without it.
          # Re-enable later only if CI duration becomes a real bottleneck.

      - name: Install dependencies
        # Try frozen-lockfile first to catch real drift in normal PRs.
        # If it fails (typically because a package.json merge conflict was
        # resolved in the GitHub web editor without regenerating yarn.lock),
        # fall back to a regular install so the audit can still run. The
        # actual security gate is the `yarn audit` JSON parser below — drift
        # alone is not a security issue.
        run: |
          set +e
          yarn install --frozen-lockfile
          STATUS=$?
          set -e
          if [ "$STATUS" -ne 0 ]; then
            echo "::warning::yarn.lock out of sync with package.json. Regenerating to allow audit to run. Please update yarn.lock locally before next merge."
            yarn install
          fi

      # yarn 1's `--level` flag has known bugs in exit-code reporting (it can
      # exit non-zero on lower-severity advisories even when no critical ones
      # exist — we observed exit code 14 = high+moderate+low, not critical).
      #
      # We bypass the broken exit-code logic by parsing yarn's JSON output and
      # counting critical-severity advisories explicitly. This is bulletproof:
      # if zero critical advisories exist, the build passes regardless of how
      # many lower-severity issues are present.
      - name: Run yarn audit
        run: |
          set +e
          # JSON mode emits one advisory per line. Filter to production deps
          # only (--groups dependencies excludes Sanity Studio devDeps).
          CRITICAL_COUNT=$(yarn audit --json --groups dependencies 2>/dev/null | grep -c '"severity":"critical"' || true)
          set -e
          echo "Critical advisories found: $CRITICAL_COUNT"
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "::error::yarn audit found $CRITICAL_COUNT critical production-dependency advisories. Run 'yarn audit' locally to identify the package(s)."
            exit 1
          fi
          echo "::notice::yarn audit clean of critical advisories. (28 high-severity Sanity Studio CVEs are documented accepted risk — see audits/DFW_HVAC_Technical_Audit_2026-04-21.md.)"
          exit 0

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history needed for proper diff scan

      - name: Run gitleaks
        # NOTE (May 11, 2026): gitleaks-action@v2 still runs on Node 20.
        # GitHub forces Node 24 on June 2, 2026. Upstream v3 release pending —
        # bump this pin once https://github.com/gitleaks/gitleaks-action/releases
        # publishes a Node 24-compatible tag. See RECURRING_MAINTENANCE.md → AH1.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Default ruleset covers AWS, GCP, Azure, Stripe, Slack, GitHub PAT,
          # private SSH keys, generic high-entropy strings. Sufficient for this
          # repo's threat model.
          GITLEAKS_ENABLE_COMMENTS: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
