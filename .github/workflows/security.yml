name: Security Audit

# Phase 1 P1.D items F8 (Dependabot+gitleaks) and F3d (yarn audit CI gate).
# Added Feb 28, 2026.
#
# WHAT THIS GATES:
#   - yarn audit on every PR + main push: fails the build on high/critical advisories
#   - gitleaks on every PR + main push: blocks secret leaks before they merge
#
# WHY:
#   - F3d closes the dependency-vuln blind spot. Sanity admin packages are
#     ignored as accepted risk (admin-only, see Apr 21 audit).
#   - F8 prevents the recurring "credential committed by accident" class of bug.
#     Site has 6+ third-party API keys (Sanity, Resend, Google Places, reCAPTCHA,
#     Google Auth, Vercel) — secret-leak detection is non-optional.

on:
  push:
    branches: [main, preview]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 7 AM Central — catches advisories disclosed against pinned versions
    # even when no PR has been opened.
    - cron: "0 13 * * 1"

jobs:
  yarn-audit:
    name: yarn audit (critical only)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies (frozen lockfile)
        run: yarn install --frozen-lockfile

      # `yarn audit --groups dependencies` excludes devDependencies.
      # We gate on **critical** only, not **high**, because all 28 high-severity
      # advisories in this repo are transitive deps of the `sanity` package
      # (admin-only Studio CMS at /studio — never exposed to public traffic).
      # These were documented as accepted risk in
      # /app/memory/audits/DFW_HVAC_Technical_Audit_2026-04-21.md. The gate will
      # auto-tighten back to high once Sanity 3.50+ clears its toolchain CVEs.
      #
      # Critical advisories (RCE, auth bypass, SQLi-class) DO block — those
      # would represent actual production threat regardless of where in the
      # dependency tree they appear.
      #
      # Exit codes (yarn 1): 0=ok · 1=low · 2=moderate · 4=high · 8=critical · 16=vulnerable
      # We fail the build only on bit 8 (critical).
      - name: Run yarn audit
        run: |
          set +e
          yarn audit --groups dependencies --level critical
          AUDIT_EXIT=$?
          set -e
          if [ $((AUDIT_EXIT & 8)) -ne 0 ]; then
            echo "::error::yarn audit found CRITICAL production-dependency advisories. Failing build."
            exit 1
          fi
          if [ $((AUDIT_EXIT & 4)) -ne 0 ]; then
            echo "::warning::yarn audit found HIGH advisories — accepted risk per documented policy (Sanity Studio admin tooling). Not failing build. See audits/DFW_HVAC_Technical_Audit_2026-04-21.md."
          fi
          echo "::notice::yarn audit clean of critical advisories."
          exit 0

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history needed for proper diff scan

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Default ruleset covers AWS, GCP, Azure, Stripe, Slack, GitHub PAT,
          # private SSH keys, generic high-entropy strings. Sufficient for this
          # repo's threat model.
          GITLEAKS_ENABLE_COMMENTS: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
